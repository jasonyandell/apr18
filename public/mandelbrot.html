<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>apr18 — Mandelbrot, zooming</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; color: #fff7d6; font-family: 'Courier New', monospace; overflow: hidden; height: 100%; }
  canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
  .hud {
    position: fixed; top: 14px; left: 14px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    letter-spacing: 0.1em;
    pointer-events: none;
    user-select: none;
  }
  .hud b { color: #ffd84a; }
  .back {
    position: fixed; top: 14px; right: 14px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: #fff7d6;
    text-decoration: none;
  }
  .back:hover { border-color: #ffd84a; color: #ffd84a; }
  .err {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
    font-size: 16px; line-height: 1.6;
    background: #0b0420;
  }
  .err code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<canvas id="gpu"></canvas>
<div class="hud">zoom <b id="zoom">1.0×</b> &nbsp;·&nbsp; click anywhere to dive</div>
<a class="back" href="/">← home</a>
<script type="module">
const canvas = document.getElementById('gpu');
const zoomLabel = document.getElementById('zoom');

async function fail(msg) {
  document.body.innerHTML = `<div class="err">🙃 ${msg}<br/><br/>Try Chrome/Edge on desktop, or enable WebGPU via <code>chrome://flags</code>.</div>`;
}

if (!navigator.gpu) {
  fail("Your browser doesn't have WebGPU, which is how this page is drawn.");
  throw new Error("no webgpu");
}

const adapter = await navigator.gpu.requestAdapter();
if (!adapter) { fail("No suitable GPU adapter found."); throw new Error("no adapter"); }
const device = await adapter.requestDevice();
const context = canvas.getContext('webgpu');
const format = navigator.gpu.getPreferredCanvasFormat();
context.configure({ device, format, alphaMode: 'opaque' });

const shader = /* wgsl */`
struct View {
  centerX: f32,
  centerY: f32,
  scale:   f32,
  aspect:  f32,
  maxIter: f32,
  time:    f32,
  _pad0:   f32,
  _pad1:   f32,
};
@group(0) @binding(0) var<uniform> view : View;

struct VSOut {
  @builtin(position) pos : vec4<f32>,
  @location(0) uv : vec2<f32>,
};

@vertex
fn vs(@builtin(vertex_index) i : u32) -> VSOut {
  // Fullscreen triangle
  var p = array<vec2<f32>, 3>(
    vec2<f32>(-1.0, -1.0),
    vec2<f32>( 3.0, -1.0),
    vec2<f32>(-1.0,  3.0),
  );
  var out : VSOut;
  let xy = p[i];
  out.pos = vec4<f32>(xy, 0.0, 1.0);
  out.uv = xy; // -1..1 range roughly
  return out;
}

fn palette(t : f32) -> vec3<f32> {
  // Smooth cosine palette, warm to cool
  let a = vec3<f32>(0.5, 0.5, 0.5);
  let b = vec3<f32>(0.5, 0.5, 0.5);
  let c = vec3<f32>(1.0, 1.0, 1.0);
  let d = vec3<f32>(0.00, 0.33, 0.67);
  return a + b * cos(6.28318 * (c * t + d));
}

@fragment
fn fs(in : VSOut) -> @location(0) vec4<f32> {
  // Map screen uv to complex plane
  let uv = vec2<f32>(in.uv.x * view.aspect, in.uv.y);
  let c = vec2<f32>(view.centerX, view.centerY) + uv * view.scale;

  var z = vec2<f32>(0.0, 0.0);
  var i : f32 = 0.0;
  let maxI = view.maxIter;
  let bail = 256.0;

  loop {
    if (i >= maxI) { break; }
    let x = z.x * z.x - z.y * z.y + c.x;
    let y = 2.0 * z.x * z.y + c.y;
    z = vec2<f32>(x, y);
    if (dot(z, z) > bail) { break; }
    i = i + 1.0;
  }

  if (i >= maxI) {
    return vec4<f32>(0.02, 0.0, 0.05, 1.0);
  }

  // Smooth iteration count
  let logZn = 0.5 * log(dot(z, z));
  let nu = log(logZn / log(2.0)) / log(2.0);
  let smooth = i + 1.0 - nu;
  let t = fract(smooth * 0.035 + view.time * 0.02);
  let col = palette(t);
  return vec4<f32>(col, 1.0);
}
`;

const module = device.createShaderModule({ code: shader });

const pipeline = device.createRenderPipeline({
  layout: 'auto',
  vertex: { module, entryPoint: 'vs' },
  fragment: { module, entryPoint: 'fs', targets: [{ format }] },
  primitive: { topology: 'triangle-list' },
});

// Uniform buffer: 8 floats = 32 bytes
const uniformBuf = device.createBuffer({
  size: 32,
  usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
});

const bindGroup = device.createBindGroup({
  layout: pipeline.getBindGroupLayout(0),
  entries: [{ binding: 0, resource: { buffer: uniformBuf } }],
});

// --- View state ---
const HOME = { cx: -0.5, cy: 0.0, scale: 1.5 };
let view = { cx: HOME.cx, cy: HOME.cy, scale: HOME.scale };
let anim = null; // { phase: 'in'|'hold'|'out', t0, targetCx, targetCy, targetScale }

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.max(1, Math.floor(canvas.clientWidth * dpr));
  const h = Math.max(1, Math.floor(canvas.clientHeight * dpr));
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
  }
}
window.addEventListener('resize', resize);
resize();

function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
}

function screenToComplex(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const u = ((clientX - rect.left) / rect.width) * 2 - 1;
  const v = 1 - ((clientY - rect.top) / rect.height) * 2; // flip y
  const aspect = canvas.width / canvas.height;
  return {
    x: view.cx + u * aspect * view.scale,
    y: view.cy + v * view.scale,
  };
}

canvas.addEventListener('click', (e) => {
  if (anim) return; // busy diving
  const target = screenToComplex(e.clientX, e.clientY);
  anim = {
    phase: 'in',
    t0: performance.now(),
    duration: 2200,
    startCx: view.cx,
    startCy: view.cy,
    startScale: view.scale,
    targetCx: target.x,
    targetCy: target.y,
    targetScale: 0.0006, // ~2500x zoom from home
  };
});

const HOLD_MS = 600;

function stepAnim(now) {
  if (!anim) return;
  const t = Math.min(1, (now - anim.t0) / anim.duration);
  const e = easeInOutCubic(t);

  if (anim.phase === 'in') {
    view.cx = anim.startCx + (anim.targetCx - anim.startCx) * e;
    view.cy = anim.startCy + (anim.targetCy - anim.startCy) * e;
    // Exponential interpolation on scale for a smooth zoom feel
    const logStart = Math.log(anim.startScale);
    const logEnd = Math.log(anim.targetScale);
    view.scale = Math.exp(logStart + (logEnd - logStart) * e);
    if (t >= 1) {
      anim = {
        phase: 'hold',
        t0: now,
        duration: HOLD_MS,
        startCx: view.cx, startCy: view.cy, startScale: view.scale,
        targetCx: HOME.cx, targetCy: HOME.cy, targetScale: HOME.scale,
      };
    }
  } else if (anim.phase === 'hold') {
    if (t >= 1) {
      anim = {
        phase: 'out',
        t0: now,
        duration: 1800,
        startCx: view.cx, startCy: view.cy, startScale: view.scale,
        targetCx: HOME.cx, targetCy: HOME.cy, targetScale: HOME.scale,
      };
    }
  } else if (anim.phase === 'out') {
    view.cx = anim.startCx + (anim.targetCx - anim.startCx) * e;
    view.cy = anim.startCy + (anim.targetCy - anim.startCy) * e;
    const logStart = Math.log(anim.startScale);
    const logEnd = Math.log(anim.targetScale);
    view.scale = Math.exp(logStart + (logEnd - logStart) * e);
    if (t >= 1) {
      view = { cx: HOME.cx, cy: HOME.cy, scale: HOME.scale };
      anim = null;
    }
  }
}

function render(now) {
  stepAnim(now);

  const aspect = canvas.width / canvas.height;
  // More iterations when deeper in
  const zoomFactor = HOME.scale / view.scale;
  const maxIter = Math.min(1200, Math.floor(120 + Math.log2(Math.max(1, zoomFactor)) * 80));

  const data = new Float32Array([
    view.cx, view.cy, view.scale, aspect,
    maxIter, now * 0.001, 0, 0,
  ]);
  device.queue.writeBuffer(uniformBuf, 0, data);

  zoomLabel.textContent = (zoomFactor).toFixed(1) + '×';

  const encoder = device.createCommandEncoder();
  const pass = encoder.beginRenderPass({
    colorAttachments: [{
      view: context.getCurrentTexture().createView(),
      clearValue: { r: 0, g: 0, b: 0, a: 1 },
      loadOp: 'clear',
      storeOp: 'store',
    }],
  });
  pass.setPipeline(pipeline);
  pass.setBindGroup(0, bindGroup);
  pass.draw(3, 1, 0, 0);
  pass.end();
  device.queue.submit([encoder.finish()]);

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
